<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle — cream -->
  <circle cx="32" cy="32" r="32" fill="#F8F4EE"/>

  <!-- Sun circle at top (from logo) -->
  <circle cx="32" cy="14" r="9" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.9"/>
  <!-- Sun rays -->
  <circle cx="32" cy="10" r="2" fill="#C9A84C"/>
  <line x1="32" y1="22" x2="32" y2="23" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="32" y1="24" x2="32" y2="25" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>

  <!-- Bridge arch — main arch -->
  <path d="M10 46 Q32 22 54 46" stroke="#8B1A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Bridge deck -->
  <line x1="10" y1="46" x2="54" y2="46" stroke="#8B1A1A" stroke-width="3" stroke-linecap="round"/>

  <!-- Bridge railing posts -->
  <line x1="18" y1="40" x2="18" y2="46" stroke="#C9A84C" stroke-width="1.2"/>
  <line x1="25" y1="33" x2="25" y2="46" stroke="#C9A84C" stroke-width="1.2"/>
  <line x1="32" y1="30" x2="32" y2="46" stroke="#C9A84C" stroke-width="1.2"/>
  <line x1="39" y1="33" x2="39" y2="46" stroke="#C9A84C" stroke-width="1.2"/>
  <line x1="46" y1="40" x2="46" y2="46" stroke="#C9A84C" stroke-width="1.2"/>

  <!-- Railing top line -->
  <path d="M10 40 Q32 26 54 40" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.7"/>

  <!-- Small lotus at bottom center -->
  <ellipse cx="32" cy="55" rx="5" ry="2.5" fill="#C9A84C" opacity="0.3"/>
  <path d="M32 52 Q29 50 28 52 Q30 50 32 49 Q34 50 36 52 Q35 50 32 52Z" fill="#C9A84C" opacity="0.7"/>

  <!-- Gold arch inner -->
  <path d="M16 46 Q32 28 48 46" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.5"/>
</svg>